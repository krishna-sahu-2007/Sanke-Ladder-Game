<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaos Snakes & Ladders: Shifting Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="game_style.css">
    
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto flex flex-col lg:flex-row gap-8 items-center">
        
        <!-- Left: Game Board -->
        <div class="flex-1 w-full flex flex-col items-center">
            <div class="flex justify-between w-full max-w-[550px] mb-4 items-end">
                <div>
                    <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-500 via-purple-500 to-indigo-500 italic uppercase tracking-tighter">
                        Shifting Chaos
                    </h1>
                    <p class="text-xs text-slate-400 font-bold uppercase tracking-widest">Dimension Alpha-9</p>
                </div>
                <div class="bg-slate-800 px-4 py-2 rounded-xl text-center border border-slate-700 shadow-xl">
                    <div class="text-[10px] text-slate-500 font-bold leading-none mb-1">TURNS UNTIL SHIFT</div>
                    <div id="shift-counter" class="text-2xl font-black text-yellow-400 leading-none">5</div>
                </div>
            </div>
            
            <div id="board" class="board-container">
                <!-- Tiles generated by JS -->
            </div>
        </div>

        <!-- Right: Controls -->
        <div class="w-full lg:w-80 flex flex-col gap-4">
            <div class="bg-slate-800 p-6 rounded-3xl border-t-4 border-indigo-500 shadow-2xl">
                <div id="turn-indicator" class="text-center text-xl font-black mb-6 transition-colors">PLAYER 1'S TURN</div>
                
                <div class="flex flex-col items-center gap-6">
                    <div id="dice-container" class="w-24 h-24 bg-white rounded-2xl flex items-center justify-center text-slate-900 text-6xl font-black shadow-[0_12px_0_#cbd5e1] mb-4 transition-all">
                        ?
                    </div>
                    <button id="roll-btn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-4 rounded-2xl font-black text-xl shadow-[0_6px_0_#4338ca] active:translate-y-1 active:shadow-none transition-all">
                        ROLL DICE
                    </button>
                </div>
            </div>

            <div class="bg-slate-800/50 p-4 rounded-2xl border border-slate-700">
                <h3 class="text-xs font-bold text-slate-500 mb-3 uppercase tracking-widest">Chaos Log</h3>
                <div id="game-log" class="h-44 overflow-y-auto text-xs space-y-1 pr-2">
                    <div class="text-indigo-400 font-bold">GAME STARTED! BEWARE THE SHIFT.</div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-2">
                <div class="bg-emerald-900/30 p-2 rounded-xl border border-emerald-500/30 text-[10px]">
                    <span class="font-bold text-emerald-400 uppercase">🪜 Ladder:</span> Move Up
                </div>
                <div class="bg-red-900/30 p-2 rounded-xl border border-red-500/30 text-[10px]">
                    <span class="font-bold text-red-400 uppercase">🐍 Snake:</span> Move Down
                </div>
                <div class="bg-purple-900/30 p-2 rounded-xl border border-purple-500/30 text-[10px]">
                    <span class="font-bold text-purple-400 uppercase">⚡ Chaos Viper:</span> Random +/-
                </div>
                <div class="bg-red-950 p-2 rounded-xl border border-red-500 text-[10px] danger-zone">
                    <span class="font-bold text-red-500 uppercase">💀 Titan Snake:</span> Back to 1
                </div>
            </div>
        </div>
    </div>

    <!-- Win Modal -->
    <div id="win-modal" class="fixed inset-0 bg-black/90 flex items-center justify-center hidden z-50 p-4">
        <div class="bg-slate-800 p-10 rounded-3xl border-4 border-yellow-500 text-center max-w-sm w-full shadow-[0_0_50px_rgba(234,179,8,0.3)]">
            <div class="text-6xl mb-4">🏆</div>
            <h2 class="text-3xl font-black mb-2 text-white uppercase italic">Winner!</h2>
            <p id="winner-text" class="text-yellow-500 text-xl font-bold mb-8 italic"></p>
            <button onclick="location.reload()" class="w-full bg-yellow-500 text-slate-900 font-black py-4 rounded-xl hover:bg-yellow-400 transition-colors">NEW CHALLENGE</button>
        </div>
    </div>

  <script src="game_script.js"></script>
</body>
</html>
